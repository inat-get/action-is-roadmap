# action.yml
name: 'Generate Roadmap'
description: 'Generates Mermaid flowchart roadmap from GitHub Milestones, Issues and Dependencies'
author: 'Ivan Shikhalev'

branding:
  icon: 'git-branch'
  color: 'blue'

inputs:
  github_token:
    description: 'GitHub token for API access'
    required: true
  output_type:
    description: 'Output target: file or wiki'
    required: true
    default: 'file'
  output_path:
    description: 'File path for output (when output_type=file)'
    required: false
    default: 'ROADMAP.md'
  wiki_title:
    description: 'Wiki page title (when output_type=wiki)'
    required: false
    default: 'Roadmap'
  config_file:
    description: 'Path to style configuration YAML'
    required: false
    default: '.github/roadmap-styles.yml'
  exclude_label:
    description: 'Label to exclude issues from roadmap'
    required: false
    default: ''

outputs:
  diagram:
    description: 'Generated Mermaid diagram code'

runs:
  using: node24
  main: dist/index.js
