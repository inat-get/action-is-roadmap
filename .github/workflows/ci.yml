name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write  # Нужно для коммита roadmap
  issues: read
  pull-requests: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        run: npm ci && npm run package

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_type: file
          output_path: 'TEST_ROADMAP.md'
          config_file: '.github/roadmap-styles.yml'

      - name: Print Generated Diagram
        id: output
        run: |
          echo "Generated diagram:"
          echo "${{ steps.test-action.outputs.diagram }}"

      - name: Check Output File Exists
        run: |
          if [ -f "TEST_ROADMAP.md" ]; then
            echo "Roadmap file created successfully"
            cat TEST_ROADMAP.md
          else
            echo "Roadmap file not found"
            exit 1
          fi
